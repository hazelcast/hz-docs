name: Deploy preview

on:
  pull_request:
    branches: [main, 'v/*']
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: node_modules/.bin/load-global-playbook -r hazelcast/hz-docs -b "$BRANCH" && node_modules/.bin/antora --to-dir docs --log-level=warn --log-failure-level=warn --fetch global-antora-playbook.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}

      - name: Deploy to Netlify
        id: netlify-deploy
        if: success()
        run: |
          DEPLOY_OUTPUT=$(npx netlify-cli deploy --no-build --dir=docs --json)
          echo "deploy_url=$(echo "$DEPLOY_OUTPUT" | jq -r '.deploy_url')" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Comment preview URL on PR
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployment: ${{ steps.netlify-deploy.outputs.deploy_url }}`
            })
